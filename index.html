<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <script>
  // Hedef nesnesini ve animasyonlu görseli seçiyoruz
  const targetEl = document.querySelector('[mindar-image-target]');
  const planeEl = document.querySelector('#myPlane');

  // Hedef Bulunduğunda
  targetEl.addEventListener("targetFound", event => {
    console.log("Hedef bulundu, animasyon tetikleniyor...");
    // Plane içindeki 'startAnimation' olayını ateşle
    planeEl.emit('startAnimation');
  });

  // Hedef Kaybolduğunda
  targetEl.addEventListener("targetLost", event => {
    console.log("Hedef kayboldu, opacity sıfırlanıyor.");
    // Bir sonraki buluşta tekrar fade-in yapabilmesi için sıfırlıyoruz
    planeEl.setAttribute('material', 'opacity', '0');
  });
</script>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind?v=1.1;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="ustGorsel" src="./FenInfo.png?v=1.1">
      </a-assets>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane src="#ustGorsel" position="0 0.5 0" height="0.927" width="1.5" rotation="0 0 0" transparent="true" alphaTest="0.5 opacity: 0;" animation="
   property: material.opacity; 
    from: 0; 
    to: 1; 
    dur: 1500; 
    easing: linear; 
    startEvents: startAnimation">
    </a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
